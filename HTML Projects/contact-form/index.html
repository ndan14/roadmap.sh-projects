<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Acme Support</title>
</head>
<body>
    <header>
        <a href="#home">Acme Support</a>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#help">Help</a></li>
                <li><a href="index.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Contact us</h1>
            <p>Send us a message and we will get back to you.</p>
            <form action="/contact" method="post">
                <p>
                    <label for="fullname">Full name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </p>
                <p>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </p>
                <p>
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>Choose a subject</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </p>
                <p>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required minlength="10"></textarea>
                </p>
                <fieldset>
                    <legend>How did you hear about us?</legend>
                    <p>
                        <input type="radio" id="search" name="way" value="search">
                        <label for="search">Search</label>
                    </p>
                    <p>
                        <input type="radio" id="friend" name="way" value="friend">
                        <label for="friend">Friend</label>
                    </p>
                    <p>
                        <input type="radio" id="social-media" name="way" value="social-media">
                        <label for="social-media">Social media</label>
                    </p>
                </fieldset>
                <p>
                    <input type="checkbox" id="noti" name="noti">
                    <label for="noti">Send me product updates</label>
                </p>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Acme Support.</p>
    </footer>
</body>
</html>
